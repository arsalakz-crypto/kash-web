<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kash</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050706;
      --surface: #1F2623;
      --stroke: rgba(255,255,255,0.08);
      --mint: #40E3B1;
      --text-primary: #F0F3F1;
      --text-secondary: #B1B9B5;
      --text-low: #737C78;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #E8EFEC;
        --surface: #FAFDFB;
        --stroke: rgba(0,0,0,0.08);
        --mint: #007856;
        --text-primary: #18211E;
        --text-secondary: #5C6762;
        --text-low: #5C6562;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100dvh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow: hidden;
    }

    .icon img {
      width: 72px;
      height: 72px;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }

    p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .note {
      font-size: 13px;
      color: var(--text-low);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <img src="icon.png" alt="Kash" />
    </div>
    <div class="text-group">
      <h1>Kash</h1>
      <p>Money clarity, minus the self deception.</p>
    </div>
    <p class="note">Coming soon to the App Store.</p>
  </div>
</body>
</html>
